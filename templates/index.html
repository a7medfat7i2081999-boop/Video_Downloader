<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - تحميل الفيديوهات</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            direction: rtl;
            /* خلفية بيضاء بالكامل مع نقط رصاصي صغيرة */
            background-color: #ffffff;
            background-image: radial-gradient(#d3d3d3 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* شريط اللغات في الأعلى */
        .languages-bar {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            background: #ffffff;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }

        .lang-btn {
            font-size: 13px;
            color: #666;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .lang-btn.active, .lang-btn:hover {
            color: #8a2be2;
            font-weight: bold;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* خانة الإدخال بمحدد بنفسجي */
        input {
            width: 280px;
            padding: 12px;
            border: 2px solid #8a2be2; 
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }

        /* خيارات الصيغة تحت اللينك */
        .format-selection {
            margin-bottom: 20px;
            text-align: right;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .format-selection label {
            font-size: 14px;
            color: #555;
        }

        /* صندوق الاختيار بمحدد بنفسجي */
        select {
            padding: 8px;
            border: 2px solid #8a2be2;
            border-radius: 6px;
            background: white;
            outline: none;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        /* زر التحميل بنفسجي */
        button {
            background-color: #8a2be2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
            margin-bottom: 15px;
        }

        button:hover {
            background-color: #6a1b9a;
        }

        /* مؤشر عدد المحاولات */
        .attempts-counter {
            font-size: 13px;
            color: #666;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        #attemptsLeft {
            color: #8a2be2;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- شريط اللغات الـ 7 الأساسية في الأعلى -->
<div class="languages-bar">
  <span class="lang-btn active" onclick="changeLang('ar')">العربية</span>
  <span class="lang-btn" onclick="changeLang('en')">English</span>
  <span class="lang-btn" onclick="changeLang('es')">Español</span>
  <span class="lang-btn" onclick="changeLang('fr')">Français</span>
  <span class="lang-btn" onclick="changeLang('de')">Deutsch</span>
  <span class="lang-btn" onclick="changeLang('tr')">Türkçe</span>
  <span class="lang-btn" onclick="changeLang('zh')">中文</span>
</div>

<div class="card">
  <h2 id="mainTitle">تحميل من اليوتيوب</h2>
  
  <form action="/download" method="POST">
    <!-- خانة إدخال الرابط -->
    <input type="text" name="url" id="videoUrl" placeholder="أدخل رابط الفيديو هنا..." required>
    
    <!-- قائمة اختيار الصيغة -->
    <div class="format-selection">
      <label id="formatLabel">إختر الصيغة:</label>
      <select name="format" id="videoFormat">
        <option id="optMp4" value="mp4">فيديو (MP4)</option>
        <option id="optMp3" value="mp3">صوت (MP3)</option>
      </select>
    </div>
    
    <button type="submit" id="downloadBtn">تحميل مباشر</button>
  </form>
  
  <!-- مؤشر عدد المحاولات المتبقية -->
  <div class="attempts-counter" id="attemptsText">
    المحاولات المتبقية: <span id="attemptsLeft">15</span> / 15
  </div>
</div>

<script>
let currentAttempts = 15;
// كود التنقل البصري السريع بين اللغات
function changeLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
}
</script>
</body>
</html>
